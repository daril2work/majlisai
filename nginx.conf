server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Explicitly define MIME types to avoid application/octet-stream issues
    types {
        text/html                             html htm shtml;
        text/css                              css;
        application/javascript                js mjs;
        image/svg+xml                         svg;
        image/x-icon                          ico;
        image/png                             png;
        image/jpeg                            jpeg jpg;
        application/json                      json;
        application/wasm                      wasm;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache and MIME type for assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}


